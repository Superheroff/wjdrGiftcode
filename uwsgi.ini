[uwsgi]
# 应用入口
module = main:app
http = 0.0.0.0:5201

# ========== 关键内存配置 ==========
# 限制总内存使用（2.5GB）
limit-as = 2560
reload-on-as = 2200        # 2200MB时自动重载
reload-on-rss = 2200

# Worker 回收（非常关键！）
max-requests = 100        # 每100个请求重启worker（防止内存泄漏）
max-requests-delta = 10
worker-reload-mercy = 30  # 给worker 30秒时间优雅退出

# 进程配置（大幅减少）
master = true
processes = 4
threads = 2
enable-threads = true

# 连接限制
listen = 128
max-fd = 4096

# 超时设置
socket-timeout = 15
http-timeout = 30
harakiri = 3600